<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈信箱</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
  min-height: 100vh;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: bgMove 18s linear infinite;
}

/* 背景微动效 */
@keyframes bgMove {
  0% { background-position: 0 0; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0 0; }
}

.card {
  background: #ffffff;
  width: 100%;
  max-width: 520px;
  border-radius: 24px;
  padding: 40px 32px;
  box-shadow: 0 20px 60px rgba(0, 55, 120, 0.08);
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: cardPop 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes cardPop {
  0% { transform: translateY(30px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

/* 顶部装饰条 */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, #4a8cff, #5fb6ff, #81c6ff);
  animation: lineFlow 3s linear infinite;
}

@keyframes lineFlow {
  0% { background-position: 0 0; }
  100% { background-position: 200% 0; }
}

.icon {
  font-size: 60px;
  margin-bottom: 20px;
  animation: iconFloat 3s ease-in-out infinite;
}

@keyframes iconFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.title {
  font-size: 26px;
  font-weight: 700;
  color: #1d2129;
  margin-bottom: 12px;
}

.desc {
  font-size: 16px;
  color: #4e5969;
  line-height: 1.6;
  margin-bottom: 30px;
}

/* 邮箱展示卡片 */
.mail-card {
  background: linear-gradient(90deg, #f2f7ff, #e9f1ff);
  border: 1px solid #d6e4ff;
  border-radius: 16px;
  padding: 22px 24px;
  font-size: 17px;
  font-weight: 600;
  color: #2563eb;
  position: relative;
  transition: all 0.3s;
  word-break: break-all;
}

.mail-card:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.1);
}

/* 动态光点 */
.mail-card::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
  animation: lightMove 5s linear infinite;
  pointer-events: none;
}

@keyframes lightMove {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

.tip {
  margin-top: 28px;
  font-size: 14px;
  color: #86909c;
  line-height: 1.5;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
  <div class="icon">📩</div>
  <div class="title">反馈信箱</div>
  <div class="desc">欢迎反馈功能优化、bug问题、使用建议，你的每一条意见都能让工具变得更好～</div>

  <div class="mail-card">
    联系邮箱：321898387@qq.com
  </div>

  <div class="tip">
    请直接发送邮件至上方邮箱<br>
    感谢你的支持与帮助 💙
  </div>
</div>

</body>
</html>
