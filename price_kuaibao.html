<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS快包管控底价</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{padding:12px;background:#f7f8fa}
.container{max-width:100%;margin:0 auto;background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
h2{font-size:18px;margin-bottom:14px;color:#222}
.red{color:red}
.warn{color:#e53e3e;font-size:12px;margin-top:6px;font-weight:bold}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.form-item{display:flex;flex-direction:column;gap:4px}
.form-item label{font-size:13px;color:#555}
input,button{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;width:100%}
.auth-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-box{background:#fff;width:90%;max-width:320px;padding:25px;border-radius:12px;text-align:center}
.auth-title{font-size:16px;font-weight:bold;margin-bottom:15px;color:#333}
.auth-input{margin-bottom:12px}
.auth-btn{background:#007bff;color:#fff;border:none;padding:10px}
.auth-tip{font-size:12px;color:#ff6c00;margin-top:8px}
.auth-error{color:red;font-size:12px;margin-top:8px;display:none}
.check-list{border:1px solid #ddd;border-radius:6px;padding:10px 12px;height:300px;overflow-y:auto;background:#fff}
.check-item{padding:8px 6px;display:flex;align-items:center;gap:10px;font-size:15px}
.check-item input{width:20px;height:20px;flex-shrink:0}
button{background:#007bff;color:#fff;border:none;cursor:pointer}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.copy-btn{background:#28a745}
.export-btn{background:#ff9800}
.ok-btn{background:#009688;margin-bottom:6px}
.clear-btn{background:#6c757d}
.prov-btn-group{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.selectAll-btn{background:#17a2b8}
.unselectAll-btn{background:#fd7e14}
.zone-tip{background:#eef7ff;padding:10px;border-radius:6px;font-size:13px;color:#0066cc;margin-bottom:12px;line-height:1.6}
.highlight-city{color:#00a800;font-weight:bold;background:#e6f7e6;padding:2px 4px;border-radius:3px}
.result-tip{font-size:14px;font-weight:bold;margin-bottom:8px}
.table-box{overflow-x:auto;border:1px solid #eee;border-radius:8px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}
th,td{padding:8px;border:1px solid #eee;text-align:center}
th{background:#f7f8fa}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="auth-mask" id="authMask">
  <div class="auth-box">
    <div class="auth-title">请输入授权码后访问</div>
    <input type="password" class="auth-input" id="authCode" placeholder="输入授权码">
    <button class="auth-btn" onclick="checkAuth()">确认授权</button>
    <div class="auth-tip">访问内容涉密，请联系管理员获取授权码</div>
    <div class="auth-error" id="authError">授权码错误，请重新输入</div>
  </div>
</div>

<div class="container" id="mainContainer" style="display:none;">
  <h2>EMS/EMS快递包裹<span class="red">管控底价</span></h2>
  <div class="warn">⚠️ 本价格为管控底价，严禁低于此价格接单</div>
  <div class="form-grid">
    <div class="form-item">
      <label>选择区号（可多选）</label>
      <div class="check-list" id="zoneCheckList" style="height:200px;">
        <label class="check-item"><input type="checkbox" value="一">一区</label>
        <label class="check-item"><input type="checkbox" value="二">二区</label>
        <label class="check-item"><input type="checkbox" value="三">三区</label>
        <label class="check-item"><input type="checkbox" value="四">四区</label>
        <label class="check-item"><input type="checkbox" value="五">五区</label>
      </div>
      <button class="clear-btn" onclick="clearAll()">清空所有选择</button>
    </div>
    <div class="form-item">
      <label>省份/城市（只显示选中区）<span id="selCount" style="color:#00a800;font-size:12px"></span></label>
      <input id="searchProv" placeholder="输入关键词实时搜索..." style="margin-bottom:4px">
      <div class="check-list" id="provCheckList"></div>
      <div class="prov-btn-group">
        <button class="selectAll-btn" onclick="selectAllProvinces()">全选当前</button>
        <button class="unselectAll-btn" onclick="unselectAllProvinces()">全不选当前</button>
      </div>
    </div>
    <div class="form-item">
      <label>重量（克）自动取整</label>
      <input type="number" id="weight" placeholder="输入重量">
      <button class="ok-btn" onclick="applySelected()">确定（应用多选）</button>
      <div class="btn-group">
        <button class="copy-btn" onclick="copyResult()">复制</button>
        <button class="export-btn" onclick="exportExcel()">导出</button>
      </div>
    </div>
  </div>
  <div class="zone-tip" id="zoneTip">请选择区号或省份查看</div>
  <div class="result-tip" id="resultTip"></div>
  <div class="table-box"><table id="resultTable"></table></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
let weightTitles = [];
let priceList = [];
let authList = [];

const zoneCheckList = document.getElementById("zoneCheckList");
const provCheckList = document.getElementById("provCheckList");
const weightEl = document.getElementById("weight");
const searchEl = document.getElementById("searchProv");
const selCount = document.getElementById("selCount");
const authError = document.getElementById("authError");

// ==============================
// 稳定网络时间
// ==============================
async function getNetworkTime() {
  try {
    const res = await fetch("https://api.m.taobao.com/rest/api3.do?api=mtop.common.getTimestamp", { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    return new Date(Number(data.data.t));
  } catch (e) {
    return new Date();
  }
}

// ==============================
// ✅ 万能日期解析（支持 2026/4/30 11:59 PM）
// ==============================
function parseExcelDate(dateValue) {
  if (!dateValue) return new Date(0);
  try {
    let str = dateValue.toString().trim();
    str = str.replace("PM", " PM").replace("AM", " AM");
    const d = new Date(str);
    if (!isNaN(d.getTime())) return d;
  } catch (e) {}
  return new Date(0);
}

// ==============================
// 读取授权码 SQ.xlsx
// ==============================
async function loadAuthData() {
  const res = await fetch("SQ.xlsx");
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array", cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
  authList = [];
  for (let i = 1; i < json.length; i++) {
    const row = json[i];
    if (!row || !row[0]) continue;
    const code = row[0].toString().trim();
    const expire = parseExcelDate(row[1]);
    authList.push({ code, expire });
  }
}

// ==============================
// 读取价格表
// ==============================
async function loadPriceData() {
  const res = await fetch("KBprice.xlsx");
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
  weightTitles = [];
  priceList = [];
  if (json.length < 1) return;
  const header = json[0];
  for (let i = 2; i < header.length; i++) {
    if (header[i]) weightTitles.push(header[i].toString());
  }
  let currentZone = "";
  for (let i = 1; i < json.length; i++) {
    const row = json[i];
    if (!row) continue;
    const zone = (row[0] || "").toString().trim() || currentZone;
    if (zone) currentZone = zone;
    const name = (row[1] || "").toString().trim();
    if (!name) continue;
    const prices = [];
    for (let j = 2; j < row.length; j++) {
      const v = row[j];
      prices.push(v === undefined ? 0 : Number(v) || 0);
    }
    priceList.push({ zone, name, prices });
  }
}

// ==============================
// 授权验证（严格顺序）
// ==============================
async function checkAuth() {
  const inputCode = document.getElementById("authCode").value.trim();
  authError.style.display = "none";
  try {
    await loadAuthData();
    const now = await getNetworkTime();

    let lastExpiredIdx = -1;
    for (let i = 0; i < authList.length; i++) {
      const item = authList[i];
      const exp = item.expire;
      if (now > exp) lastExpiredIdx = i;
    }

    const validIdx = lastExpiredIdx + 1;
    if (validIdx >= authList.length) throw new Error("所有授权码已过期");

    const validItem = authList[validIdx];
    if (inputCode !== validItem.code) throw new Error("授权码不存在或未到启用时间");

    await loadPriceData();
    alert("价格信息读取成功");
    document.getElementById("authMask").style.display = "none";
    document.getElementById("mainContainer").style.display = "block";
    updateProvinceList();
  } catch (e) {
    authError.textContent = e.message;
    authError.style.display = "block";
  }
}

// ==============================
// 下面逻辑不变
// ==============================
document.getElementById("authCode").addEventListener("keydown", e => {
  if (e.key === "Enter") checkAuth();
});

zoneCheckList.addEventListener("change", updateProvinceList);
searchEl.addEventListener("input", updateProvinceList);
searchEl.addEventListener("keydown", e => e.key === "Enter" && applySelected());
weightEl.addEventListener("keydown", e => e.key === "Enter" && applySelected());

function updateProvinceList() {
  const selectedZones = Array.from(zoneCheckList.querySelectorAll("input:checked")).map(i => i.value);
  const keyword = searchEl.value.trim().toLowerCase();
  let list = priceList;
  if (selectedZones.length > 0) list = list.filter(item => selectedZones.includes(item.zone));
  if (keyword) list = list.filter(item => item.name.toLowerCase().includes(keyword));
  provCheckList.innerHTML = "";
  list.forEach(item => {
    const label = document.createElement("label");
    label.className = "check-item";
    label.innerHTML = `<input type="checkbox" value="${item.name}">${item.name}`;
    provCheckList.appendChild(label);
  });
  showSelectCount();
}

function showSelectCount() {
  const cnt = provCheckList.querySelectorAll("input:checked").length;
  selCount.textContent = cnt ? `（已选 ${cnt} 个）` : '';
}

function selectAllProvinces() {
  provCheckList.querySelectorAll("input").forEach(i => i.checked = true);
  showSelectCount();
}

function unselectAllProvinces() {
  provCheckList.querySelectorAll("input").forEach(i => i.checked = false);
  showSelectCount();
}

function clearAll() {
  zoneCheckList.querySelectorAll("input").forEach(i => i.checked = false);
  provCheckList.innerHTML = "";
  searchEl.value = "";
  weightEl.value = "";
  selCount.textContent = "";
  zoneTip.innerHTML = "请选择区号或省份查看";
  document.getElementById("resultTable").innerHTML = "";
  document.getElementById("resultTip").textContent = "";
}

function applySelected() {
  showSelectCount();
  updateTip();
  search();
}

function updateTip() {
  const selectedZones = new Set(Array.from(zoneCheckList.querySelectorAll("input:checked")).map(i => i.value));
  const selectedProvinces = Array.from(provCheckList.querySelectorAll("input:checked")).map(i => i.value);
  selectedProvinces.forEach(p => {
    const item = priceList.find(i => i.name === p);
    if (item) selectedZones.add(item.zone);
  });
  if (selectedZones.size === 0 && selectedProvinces.length === 0) {
    zoneTip.innerHTML = "请选择区号或省份查看";
    return;
  }
  let allItems = [];
  selectedZones.forEach(z => {
    allItems = allItems.concat(priceList.filter(i => i.zone === z));
  });
  const html = allItems.map(item => selectedProvinces.includes(item.name) ? `<span class="highlight-city">${item.name}</span>` : item.name).join("　");
  zoneTip.innerHTML = `<strong>${Array.from(selectedZones).join("/")}区</strong> 包含：${html}`;
}

function search() {
  const weightVal = weightEl.value.trim();
  const g = weightVal ? Number(weightVal) : null;
  const selectedZones = Array.from(zoneCheckList.querySelectorAll("input:checked")).map(i => i.value);
  const selectedProvinces = Array.from(provCheckList.querySelectorAll("input:checked")).map(i => i.value);

  let data = priceList;
  if (selectedZones.length > 0) data = data.filter(i => selectedZones.includes(i.zone));
  if (selectedProvinces.length > 0) data = data.filter(i => selectedProvinces.includes(i.name));

  const table = document.getElementById("resultTable");
  const resultTip = document.getElementById("resultTip");
  let html = "";

  if (g !== null && !isNaN(g)) {
    let idx = 0;
    if (g <= 300) idx = 0;
    else if (g <= 500) idx = 1;
    else if (g <= 1000) idx = 2;
    else if (g <= 2000) idx = 3;
    else if (g <= 3000) idx = 4;
    else { resultTip.textContent = "重量超出范围"; table.innerHTML = ""; return; }

    const label = weightTitles[idx] || `${idx + 1}档`;
    resultTip.textContent = `重量：${g}克（${label}）`;
    html = `<tr><th>区号</th><th>省份/城市</th><th>重量区间</th><th>价格</th></tr>`;
    data.forEach(item => {
      const p = item.prices[idx] || 0;
      html += `<tr><td>${item.zone}</td><td>${item.name}</td><td>${label}</td><td>${p}</td></tr>`;
    });
  } else {
    resultTip.textContent = "重量留空，显示所有重量价格";
    html = `<tr><th>区号</th><th>省份/城市</th>`;
    weightTitles.forEach(t => html += `<th>${t}</th>`);
    html += `</tr>`;
    data.forEach(item => {
      html += `<tr><td>${item.zone}</td><td>${item.name}</td>`;
      item.prices.forEach((p) => { html += `<td>${p}</td>`; });
      html += `</tr>`;
    });
  }
  table.innerHTML = html;
}

function copyResult(){
  if(!copyText){alert("请先查询");return;}
  navigator.clipboard.writeText(copyText.trim()).then(()=>alert("复制成功！"));
}

function exportExcel(){
  alert("导出功能已禁用");
}
</script>
</body>
</html>
