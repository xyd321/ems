<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快递业务管理系统 - 首页</title>
<style>
/* 基础重置 */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

body {
  background: #667eea;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 800px;
  background: white;
  border-radius: 10px;
  padding: 40px 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.main-icon {
  font-size: 60px;
  margin-bottom: 20px;
  color: #667eea;
  display: inline-block;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 28px;
  color: #333;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  font-size: 16px;
  margin-bottom: 30px;
  line-height: 1.5;
}

.features {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin: 30px 0;
}

.feature-item {
  width: 120px;
  padding: 20px 10px;
  background: #f8f9fa;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid #e9ecef;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.feature-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  border-color: #667eea;
}

.feature-icon {
  font-size: 30px;
  margin-bottom: 10px;
  display: block;
}

/* 每个图标不同的动画 */
.feature-item:nth-child(1) .feature-icon {
  animation: flash 2s infinite;
  color: #ff6b6b;
}
.feature-item:nth-child(2) .feature-icon {
  animation: float 3s infinite;
  color: #4ecdc4;
}
.feature-item:nth-child(3) .feature-icon {
  animation: swing 4s infinite;
  color: #45b7d1;
}
.feature-item:nth-child(4) .feature-icon {
  animation: pulse 2s infinite;
  color: #96ceb4;
}
.feature-item:nth-child(5) .feature-icon {
  animation: bounceSmall 2s infinite;
  color: #feca57;
}

@keyframes flash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
@keyframes swing {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-5deg); }
  75% { transform: rotate(5deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
@keyframes bounceSmall {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

.feature-text {
  font-size: 13px;
  color: #333;
  font-weight: 600;
}

.footer {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid #eee;
  color: #666;
  font-size: 13px;
}

/* 移动端适配 */
@media (max-width: 768px) {
  .container {
    padding: 20px;
    margin: 10px;
  }
  h1 { font-size: 24px; }
  .main-icon { font-size: 50px; }
  .feature-item { width: 100px; padding: 15px 5px; }
  .feature-icon { font-size: 25px; }
  .features { gap: 10px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="main-icon">📦</div>
  <h1>快递业务管理系统</h1>
  <p class="subtitle">欢迎使用快递业务管理系统，点击下方功能卡片开始使用</p >
  
  <div class="features">
    <div class="feature-item" onclick="loadPage('price_tekuai.html')">
      <span class="feature-icon">⚡</span>
      <span class="feature-text">特快报价</span>
    </div>
    <div class="feature-item" onclick="loadPage('price_kuaibao.html')">
      <span class="feature-icon">📨</span>
      <span class="feature-text">快包报价</span>
    </div>
    <div class="feature-item" onclick="loadPage('province_time.html')">
      <span class="feature-icon">🗺️</span>
      <span class="feature-text">时效查询</span>
    </div>
    <div class="feature-item" onclick="loadPage('barcode.html')">
      <span class="feature-icon">📇</span>
      <span class="feature-text">条码转换</span>
    </div>
    <div class="feature-item" onclick="loadPage('dedupe.html')">
      <span class="feature-icon">🔍</span>
      <span class="feature-text">单号去重</span>
    </div>
  </div>
  
  <div class="footer">
    <p>版本 2.1.0 | 点击左侧菜单查看更多功能</p >
  </div>
</div>

<script>
// 简化页面加载函数
function loadPage(url) {
  if (window.parent && window.parent !== window && window.parent.loadPage) {
    window.parent.loadPage(url);
  } else {
    // 独立运行时提示
    alert('在系统中会加载页面: ' + url);
  }
}

// 页面加载完成
window.onload = function() {
  console.log('页面加载完成');
  
  // 为卡片添加点击效果
  const items = document.querySelectorAll('.feature-item');
  items.forEach(item => {
    item.addEventListener('click', function() {
      this.style.transform = 'scale(0.95)';
      setTimeout(() => {
        this.style.transform = '';
      }, 200);
    });
  });
};
</script>
</body>
</html>
