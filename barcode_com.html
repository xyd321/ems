<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮政快递单号条形码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",Segoe UI,Roboto,sans-serif}
body{background:linear-gradient(135deg,#f0f4f8,#e2e8f0);padding:30px 12px;min-height:100vh}
.container{max-width:1400px;margin:0 auto;background:#ffffff;border-radius:20px;padding:32px;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
.title{text-align:center;font-size:28px;margin-bottom:28px;color:#1e293b;font-weight:700}
.result-tip{margin-top:10px;font-size:13px;color:#165DFF;line-height:1.5;display:none;white-space:pre-line}
.copy-toast{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 16px;border-radius:10px;font-size:15px;z-index:10000;display:none}
.operate-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
@media(max-width:900px){.operate-wrap{grid-template-columns:1fr}}
.card{background:#f8fafc;border-radius:16px;padding:24px;border:1px solid #e2e8f0}
.card-title{font-size:18px;font-weight:600;margin-bottom:16px;color:#0f172a}
textarea{width:100%;height:140px;padding:14px;border:1px solid #cbd5e1;border-radius:12px;font-size:14px;resize:none;transition:border 0.2s}
textarea:focus{border-color:#165DFF;outline:none}
.btn{padding:12px 18px;border-radius:10px;font-size:14px;border:none;cursor:pointer;font-weight:500;margin-top:12px;margin-right:8px;transition:all 0.2s}
.btn-primary{background:#165DFF;color:#fff}
.btn-primary:hover{background:#0f46c6}
.btn-success{background:#00b42a;color:#fff}
.btn-success:hover{background:#009a23}
.btn-warning{background:#ff7d00;color:#fff}
.btn-warning:hover{background:#e67000}
.btn-danger{background:#f43f5e;color:#fff}
.btn-danger:hover{background:#e61e4d}
.file-btn{display:inline-block;padding:12px 18px;background:#00b42a;color:#fff;border-radius:10px;cursor:pointer}
#excelFile{display:none}
.select-col{margin-top:14px;padding:10px 12px;border-radius:10px;width:100%;border:1px solid #cbd5e1;font-size:14px}
.tip{font-size:13px;color:#64748b;margin-top:8px}
.result-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.total{font-size:16px;font-weight:600;color:#165DFF}
.tool-group{display:flex;gap:10px;align-items:center}
.barcode-list{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;max-width:100%}
@media(max-width:1200px){.barcode-list{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){.barcode-list{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.barcode-list{grid-template-columns:repeat(2,1fr)}}
.barcode-item{background:#ffffff;border:2px solid #e2e8f0;border-radius:14px;padding:16px 10px;text-align:center;transition:all 0.2s;width:100%;cursor:pointer}
.barcode-item:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.08)}
.barcode-item.active{border-color:#165DFF;background:#eff6ff}
.barcode-no{font-size:13px;color:#64748b;margin-bottom:10px}
.barcode-code{margin:0 auto 10px;max-width:100%;width:140px;height:50px}
.barcode-text{font-size:14px;font-weight:600;color:#1e293b;word-break:break-all}
.pagination{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:28px;flex-wrap:wrap}
.pagination button{padding:8px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#334155;cursor:pointer}
.pagination button:disabled{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0;cursor:not-allowed}
.pagination input{width:56px;text-align:center;padding:8px 4px;border-radius:8px;border:1px solid #cbd5e1}
.pagination span{font-size:15px;color:#334155;min-width:60px;text-align:center}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:9999;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:20px;padding:36px;max-width:480px;width:90%;text-align:center;position:relative}
.close{position:absolute;top:18px;right:20px;font-size:26px;color:#94a3b8;cursor:pointer}
.modal-index{font-size:15px;color:#64748b;margin-bottom:18px}
.modal-barcode{margin:0 auto 18px;max-width:90%;display:flex;justify-content:center;align-items:center}
.modal-text{font-size:18px;font-weight:600;margin-bottom:22px;cursor:pointer}
.modal-btns{display:flex;gap:16px;justify-content:center}
.modal-btns button{padding:12px 24px;border-radius:10px;font-size:15px;border:none;background:#165DFF;color:#fff;width:120px}
.modal-btns button:disabled{background:#cbd5e1}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;font-size:17px;color:#165DFF}
.spinner{width:46px;height:46px;border:4px solid #e6efff;border-top:4px solid #165DFF;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.progress-text{margin-top:10px;font-size:16px;color:#165DFF;font-weight:600}
.stop-text{margin-top:12px;font-size:16px;color:#165DFF;font-weight:600;cursor:pointer;text-decoration:underline;display:none}
@media print{body *{visibility:hidden}.barcode-list,.barcode-list *{visibility:visible}.barcode-list{position:absolute;left:0;top:0;display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:4px!important;padding:4px}.modal,.tool-group,.pagination,.total{display:none!important}.barcode-item{border:1px solid #ccc!important}}
.page-size-select{padding:8px 12px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px}
</style>
</head>
<body>
<div class="copy-toast" id="copyToast"></div>
<div class="container">
  <div class="title">邮政快递单号条形码生成器</div>
  <div class="operate-wrap">
    <div class="card">
      <div class="card-title">📝 手动输入单号</div>
      <textarea id="numInput" placeholder="请输入快递单号，一行一个"></textarea>
      <button class="btn btn-primary" onclick="generateByInput()">生成条形码</button>
      <button class="btn btn-danger" onclick="clearAll()">清空所有数据</button>
      <button class="btn btn-warning" onclick="clearHighlight()">清空高亮</button>
      <div id="inputTip" class="result-tip"></div>
      <div class="tip">✅ 专治：引号+空格+0.3后缀+中文混合，直接提取13位单号</div>
    </div>
    <div class="card">
      <div class="card-title">📊 Excel/CSV导入生成</div>
      <label for="excelFile" class="file-btn">选择Excel/CSV文件</label>
      <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
      <select id="column" class="select-col" style="display:none"></select>
      <button class="btn btn-success" style="display:none" id="genExcelBtn" onclick="generateByExcel()">按选中列生成</button>
      <div id="excelTip" class="result-tip"></div>
      <div class="tip">支持xlsx/xls/csv，自动识别中文表头，空行自动跳过</div>
    </div>
  </div>
  <div class="result-info">
    <div class="total" id="totalCount"></div>
    <div class="tool-group">
      <button class="btn btn-warning" onclick="printBarcodes()" id="printBtn" disabled>一键打印</button>
      <button class="btn btn-primary" onclick="exportCurrentPageImages()" id="exportBtn" disabled>导出当前页</button>
    </div>
  </div>
  <div class="barcode-list" id="barcodeList"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-index" id="modalIndex"></div>
    <div class="modal-barcode" id="modalBarcode"></div>
    <div class="modal-text" id="modalText" onclick="copyCurrentNumber()"></div>
    <div class="modal-btns">
      <button id="prevBtn">上一张</button>
      <button id="nextBtn">下一张</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div id="loadingText">正在处理数据，请稍候...</div>
  <div id="progressText" class="progress-text"></div>
  <div id="stopText" class="stop-text" onclick="stopExport()">点击停止导出</div>
</div>

<script>
let allNumbers = [];
let currentPage = 1;
let pageSize = 20;
let currentModalIndex = -1;
let lastActiveIndex = -1;
let isClearing = false;
let stopExportFlag = false;
let isExporting = false;

const loading = document.getElementById("loading");
const loadingText = document.getElementById("loadingText");
const progressText = document.getElementById("progressText");
const stopText = document.getElementById("stopText");
const excelFileInput = document.getElementById("excelFile");
const inputTip = document.getElementById("inputTip");
const excelTip = document.getElementById("excelTip");
const copyToast = document.getElementById("copyToast");

function showLoadingCustom(text){
  loading.style.display = "flex";
  loadingText.textContent = text;
  progressText.textContent = "";
  stopText.style.display = "none";
}
function showLoading(){showLoadingCustom("正在处理数据，请稍候...");}
function hideLoading(){loading.style.display = "none";isExporting = false;}

function showCopyToast(text){copyToast.textContent=text;copyToast.style.display="block";setTimeout(()=>copyToast.style.display="none",1200);}
function showTip(el,text){el.textContent=text;el.style.display="block";}
function hideAllTips(){inputTip.style.display="none";excelTip.style.display="none";}

// =======================
// ✅ 终极修复：全局提取13位数字，任何脏数据都能挖到
// =======================
function cleanNumber(str) {
  if (!str) return '';
  let s = String(str);
  // 最稳逻辑：不管乱七八糟内容，直接搜所有连续13位数字
  const matches = s.match(/\d{13}/g);
  if (matches && matches.length > 0) {
    return matches[0]; // 返回第一个13位数字
  }
  return '';
}

function uniqueArray(arr){return [...new Set(arr)];}

function getRealColumnName(rows, colIndex){
  for(let r=0;r<rows.length;r++){
    const row=rows[r]||[];
    const val=row[colIndex];
    const txt=(val===null||val===undefined)?'':String(val).trim();
    if(txt!=='') return txt;
  }
  return `列${colIndex+1}`;
}

function copyCurrentNumber(){
  if(currentModalIndex<0||!allNumbers[currentModalIndex]) return;
  navigator.clipboard.writeText(allNumbers[currentModalIndex]).then(()=>showCopyToast("✅ 已复制"));
}

function clearHighlight(){lastActiveIndex=-1;renderPage();showTip(inputTip,"已清空高亮");setTimeout(hideAllTips,2000);}

function generateByInput(){
  if(isClearing) return;
  hideAllTips();
  const t=document.getElementById('numInput').value.trim();
  if(!t){showTip(inputTip,'请输入单号');return;}
  const lines=t.split('\n');
  const nums=[];
  lines.forEach(line=>{const c=cleanNumber(line);if(c)nums.push(c);});
  const u=uniqueArray(nums);
  if(u.length===0){showTip(inputTip,'未找到有效13位单号');return;}
  allNumbers=u;renderBarcodes();
  showTip(inputTip,`有效：${nums.length}｜去重：${nums.length-u.length}｜最终：${u.length}`);
}

excelFileInput.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  clearAllSync();
  showLoadingCustom("正在解析文件...");
  const reader = new FileReader();
  const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
  
  if(isExcel){
    reader.readAsArrayBuffer(file);
    reader.onload = function(e){
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:true});
        buildColumnSelect(rows);
      }catch(err){
        showTip(excelTip,"Excel解析失败");
      }finally{
        hideLoading();
        excelFileInput.value='';
      }
    };
  }else{
    reader.readAsArrayBuffer(file);
    reader.onload = function(e){
      try{
        const buffer = new Uint8Array(e.target.result);
        let text = new TextDecoder('gbk').decode(buffer);
        if(text.includes('�')) text = new TextDecoder('utf-8').decode(buffer);
        const wb = XLSX.read(text, {type:'string'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:true});
        buildColumnSelect(rows);
      }catch(err){
        showTip(excelTip,"CSV解析失败");
      }finally{
        hideLoading();
        excelFileInput.value='';
      }
    };
  }
});

function buildColumnSelect(rows){
  const sel = document.getElementById('column');
  sel.innerHTML = '';
  const colCount = rows.reduce((m,r)=>Math.max(m,r?r.length:0),0);
  for(let c=0;c<colCount;c++){
    const name = getRealColumnName(rows,c);
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = name;
    sel.appendChild(opt);
  }
  sel.style.display = 'block';
  document.getElementById('genExcelBtn').style.display = 'inline-block';
  window.excelData = rows;
}

function generateByExcel(){
  if(isClearing||!window.excelData) return;
  hideAllTips();
  showLoadingCustom("正在读取数据...");
  setTimeout(()=>{
    try{
      const col = +document.getElementById('column').value;
      const nums = [];
      window.excelData.forEach(row=>{
        if(!row) return;
        const v = String(row[col]||'').trim();
        const c = cleanNumber(v);
        if(c) nums.push(c);
      });
      const u = uniqueArray(nums);
      if(u.length===0){showTip(excelTip,'该列无有效单号');hideLoading();return;}
      allNumbers = u;
      renderBarcodes();
      showTip(excelTip,`有效：${nums.length}｜去重：${nums.length-u.length}｜最终：${u.length}`);
    }catch(e){
      showTip(excelTip,'处理失败');
    }finally{
      hideLoading();
    }
  },300);
}

function renderBarcodes(){
  currentPage=1;renderPage();renderPagination();
  const has=allNumbers.length>0;
  document.getElementById('totalCount').textContent=has?`共 ${allNumbers.length} 个`:'';
  document.getElementById('printBtn').disabled=!has;
  document.getElementById('exportBtn').disabled=!has;
}

function renderPage(){
  const list=document.getElementById('barcodeList');
  list.innerHTML='';
  const total=allNumbers.length;
  if(total===0) return;
  const s=(currentPage-1)*pageSize;
  const e=s+pageSize;
  const d=allNumbers.slice(s,e);
  d.forEach((num,i)=>{
    const idx=s+i;
    const item=document.createElement('div');
    item.className='barcode-item';
    if(idx===lastActiveIndex)item.classList.add('active');
    item.onclick=()=>openModal(idx);
    item.innerHTML=`<div class="barcode-no">NO.${idx+1}</div><svg class="barcode-code" id="bc${idx}"></svg><div class="barcode-text">${num}</div>`;
    list.appendChild(item);
    JsBarcode(`#bc${idx}`,num,{format:'CODE128',width:1.6,height:46,displayValue:false,margin:0});
  });
}

function renderPagination(){
  const box=document.getElementById('pagination');
  box.innerHTML='';
  const total=allNumbers.length;
  if(total===0)return;
  const totalPage=Math.ceil(total/pageSize);
  const ps=document.createElement('select');
  ps.className='page-size-select';
  [20,50,100,200,500,1000,2000,5000,10000,20000,'custom'].forEach(v=>{
    const o=document.createElement('option');
    o.value=v;
    o.textContent=v==='custom'?'自定义':`${v}条/页`;
    if(v==pageSize)o.selected=true;
    ps.appendChild(o);
  });
  ps.onchange=()=>{
    if(ps.value==='custom'){
      const cv=prompt('输入条数1-20000','20');
      const n=parseInt(cv);
      pageSize=(n&&n>=1&&n<=20000)?n:20;
    }else{
      pageSize=parseInt(ps.value);
    }
    currentPage=1;
    renderPage();
    renderPagination();
  };
  const fb=document.createElement('button');fb.textContent='首页';fb.disabled=currentPage===1;fb.onclick=()=>{currentPage=1;renderPage();renderPagination();};
  const pb=document.createElement('button');pb.textContent='上一页';pb.disabled=currentPage===1;pb.onclick=()=>{currentPage--;renderPage();renderPagination();};
  const pt=document.createElement('span');pt.textContent=`${currentPage}/${totalPage}`;
  const pi=document.createElement('input');pi.type='number';pi.min=1;pi.max=totalPage;pi.placeholder='页';
  const jb=document.createElement('button');jb.textContent='跳转';jb.onclick=()=>{
    const t=parseInt(pi.value);if(isNaN(t)||t<1||t>totalPage){showTip(inputTip,'页码错误');return;}
    currentPage=t;renderPage();renderPagination();
  };
  const nb=document.createElement('button');nb.textContent='下一页';nb.disabled=currentPage===totalPage;nb.onclick=()=>{currentPage++;renderPage();renderPagination();};
  const lb=document.createElement('button');lb.textContent='尾页';lb.disabled=currentPage===totalPage;lb.onclick=()=>{currentPage=totalPage;renderPage();renderPagination();};
  box.append(ps,fb,pb,pt,pi,jb,nb,lb);
}

function openModal(idx){
  if(allNumbers.length===0)return;
  currentModalIndex=idx;
  const num=allNumbers[idx];
  document.getElementById('modalIndex').textContent=`第 ${idx+1}/${allNumbers.length} 个`;
  document.getElementById('modalBarcode').innerHTML=`<svg id="modalBc" style="max-width:90%;width:180px;height:55px;"></svg>`;
  JsBarcode('#modalBc',num,{format:'CODE128',width:1.6,height:55,displayValue:false});
  document.getElementById('modalText').textContent=num;
  updateBtn();
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
  if(currentModalIndex<0)return;
  lastActiveIndex=currentModalIndex;
  const tp=Math.floor(currentModalIndex/pageSize)+1;
  if(tp!==currentPage){currentPage=tp;renderPagination();}
  renderPage();
}

function prevBarcode(){if(currentModalIndex>0)openModal(currentModalIndex-1);}
function nextBarcode(){if(currentModalIndex<allNumbers.length-1)openModal(currentModalIndex+1);}
function updateBtn(){
  document.getElementById('prevBtn').onclick=prevBarcode;
  document.getElementById('nextBtn').onclick=nextBarcode;
  document.getElementById('prevBtn').disabled=currentModalIndex<=0;
  document.getElementById('nextBtn').disabled=currentModalIndex>=allNumbers.length-1;
}

function clearAllSync(){
  allNumbers=[];currentModalIndex=-1;lastActiveIndex=-1;window.excelData=null;
  document.getElementById('numInput').value='';document.getElementById('barcodeList').innerHTML='';
  document.getElementById('totalCount').textContent='';document.getElementById('pagination').innerHTML='';
  document.getElementById('printBtn').disabled=true;document.getElementById('exportBtn').disabled=true;
  document.getElementById('column').style.display='none';document.getElementById('genExcelBtn').style.display='none';
  hideAllTips();
}

function clearAll(){
  if(isClearing)return;
  isClearing=true;
  showLoadingCustom("正在清空...");
  setTimeout(()=>{clearAllSync();isClearing=false;hideLoading();},200);
}

function printBarcodes(){if(allNumbers.length===0){showTip(inputTip,'请先生成');return;}window.print();}
function stopExport(){stopExportFlag=true;stopText.textContent="已停止";stopText.style.color="#999";stopText.style.cursor="default";}

async function exportCurrentPageImages(){
  if(allNumbers.length===0||isExporting)return;
  isExporting=true;stopExportFlag=false;
  showLoadingCustom("正在导出条形码...");
  stopText.style.display="block";stopText.textContent="点击停止导出";stopText.style.color="#165DFF";stopText.style.cursor="pointer";
  const s=(currentPage-1)*pageSize;const e=Math.min(s+pageSize,allNumbers.length);const p=allNumbers.slice(s,e);const t=p.length;
  try{
    const zip=new JSZip();const f=zip.folder("条码");
    for(let i=0;i<t;i++){
      if(stopExportFlag)break;
      const num=p[i];const idx=s+i;const el=document.getElementById(`bc${idx}`);if(!el)continue;
      const pct=((i+1)/t*100).toFixed(0);
      progressText.textContent=`进度：${i+1}/${t} ${pct}%`;
      const canvas=await html2canvas(el.parentElement,{scale:3,useCORS:true});
      const b64=canvas.toDataURL('image/png').split(',')[1];
      f.file(`条码_${String(i+1).padStart(3,'0')}_${num}.png`,b64,{base64:true});
      await new Promise(r=>setTimeout(r,5));
    }
    if(!stopExportFlag){
      const blob=await zip.generateAsync({type:'blob'});
      saveAs(blob,`邮政条码_第${currentPage}页.zip`);
      progressText.textContent="导出完成";
      showTip(inputTip,"导出成功");
      setTimeout(hideAllTips,2500);
    }else{
      progressText.textContent="已取消";
    }
  }catch(e){
    progressText.textContent="导出失败";
    showTip(inputTip,"导出失败");
  }finally{
    setTimeout(()=>hideLoading(),1200);
  }
}

async function exportAllImages(){
  if(allNumbers.length===0){showTip(inputTip,'请先生成');return;}
  showLoadingCustom("导出全部...");
  try{
    const zip=new JSZip();const f=zip.folder("条码全部");
    for(let i=0;i<allNumbers.length;i++){
      const el=document.getElementById(`bc${i}`);if(!el)continue;
      const canvas=await html2canvas(el.parentElement,{scale:3,useCORS:true});
      const b64=canvas.toDataURL('image/png').split(',')[1];
      f.file(`条码_${String(i+1).padStart(3,'0')}_${allNumbers[i]}.png`,b64,{base64:true});
    }
    const blob=await zip.generateAsync({type:'blob'});saveAs(blob,'邮政条码全部.zip');
    showTip(inputTip,"导出成功");setTimeout(hideAllTips,2000);
  }catch(e){
    showTip(inputTip,"导出失败");
  }finally{
    hideLoading();
  }
}
</script>
</body>
</html>
