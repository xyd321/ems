<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快递单号去重</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, sans-serif;
}
body{
  background:#f7f8fa;
  padding:20px;
}
.container{
  max-width:800px;
  margin:0 auto;
}
h2{
  font-size:18px;
  color:#333;
  margin-bottom:12px;
}
.text-box{
  width:100%;
  height:220px;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:12px;
  font-size:14px;
  resize:vertical;
  outline:none;
  background:#fff;
}
.btn-group{
  display:flex;
  gap:10px;
  margin:12px 0;
  flex-wrap:wrap;
}
button{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#667eea;
  color:#fff;
  cursor:pointer;
  font-size:14px;
}
button:hover{
  opacity:0.9;
}
.btn-clear{
  background:#999;
}
.stats{
  display:flex;
  gap:15px;
  margin-bottom:10px;
  font-size:14px;
  color:#333;
}
.stats span{
  font-weight:600;
  color:#667eea;
}
.result-box{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:12px;
  min-height:120px;
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.6;
}
.info{
  font-size:13px;
  color:#666;
  margin-top:8px;
}
</style>
</head>
<body>
<div class="container">
  <h2>快递单号去重 · 自动清理符号</h2>
  <textarea class="text-box" id="inputNum" placeholder="请粘贴快递单号，支持批量、自动去除前后引号/空格/符号并去重"></textarea>
  <div class="btn-group">
    <button onclick="processDedupe()">开始处理</button>
    <button class="btn-clear" onclick="clearAll()">清空内容</button>
    <button onclick="copyResult()">一键复制纯单号（不带序号）</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="info">展示带序号，复制自动去掉序号，只保留纯快递单号</div>
  <div class="result-box" id="result"></div>
</div>
<script>
let pureResult = [];

// 清洗：只保留数字+字母，其余全部去掉
function cleanStr(s) {
  return s.replace(/[^0-9a-zA-Z]/g, '');
}

function processDedupe() {
  const val = document.getElementById('inputNum').value;
  if (!val.trim()) {
    document.getElementById('result').innerText = '请输入快递单号';
    document.getElementById('stats').innerText = '';
    pureResult = [];
    return;
  }

  // 按行拆分
  const lines = val.split(/\n/).map(line => line.trim());

  const originalList = [];
  lines.forEach(line => {
    const cleaned = cleanStr(line);
    // 整行清洗后为空 → 整行丢弃
    if (cleaned) originalList.push(cleaned);
  });

  const originalCount = originalList.length;
  // 去重
  const unique = [...new Set(originalList)];
  pureResult = unique;

  const uniqueCount = unique.length;
  const repeatCount = originalCount - uniqueCount;

  document.getElementById('stats').innerHTML =
    `原始总数：<span>${originalCount}</span> ｜ 重复个数：<span>${repeatCount}</span> ｜ 去重后剩余：<span>${uniqueCount}</span>`;

  const showText = unique.map((num, idx) => `${idx + 1}. ${num}`).join('\n');
  document.getElementById('result').innerText = showText;
}

function clearAll() {
  document.getElementById('inputNum').value = '';
  document.getElementById('result').innerText = '';
  document.getElementById('stats').innerText = '';
  pureResult = [];
}

function copyResult() {
  if (pureResult.length === 0) {
    alert('暂无结果可复制');
    return;
  }
  const text = pureResult.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    alert('复制成功！仅复制纯单号，不带序号');
  }).catch(() => {
    alert('复制失败，请手动复制');
  });
}
</script>
</body>
</html>
